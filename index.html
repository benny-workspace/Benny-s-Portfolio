    <!-- FAQPage structured data — enables rich FAQ results in Google Search -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What services do you offer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "AI receptionist systems for dental clinics, high-end web and React UI builds, cinematic video and AI filmmaking, and personal brand content strategy. Everything runs under one roof."
            }
          },
          {
            "@type": "Question",
            "name": "What is your typical turnaround time?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Web and product work: two to four weeks. Video and AI creative: one to three weeks depending on scope. AI dental systems: one day from call to live."
            }
          },
          {
            "@type": "Question",
            "name": "Do you work with international clients?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Primarily US based clients. Everything runs remotely with structured feedback loops, so location is never a blocker on your end."
            }
          },
          {
            "@type": "Question",
            "name": "Do you take on redesign and rebuild projects?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Selectively. I work with established names and brands that have something worth rebuilding. I strip it back, remove the noise, and turn it into something that actually performs."
            }
          },
          {
            "@type": "Question",
            "name": "Do you handle branding and content strategy?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "For the right partners, yes. What I offer is premium, strategic, and tailored. If your brand needs direction and not just output, that's where I come in."
            }
          }
        ]
      }
